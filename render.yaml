services:
  - type: worker
    name: bugsy-bot
    runtime: node
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: bugsy-db
          property: connectionString

databases:
  - name: bugsy-db
    plan: basic
