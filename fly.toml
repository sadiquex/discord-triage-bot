# fly.toml — generated for discord-triage-bot
# Run `fly launch` to create the app and get a unique name, then `fly deploy`

app = "discord-triage-bot"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
